<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentara App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
        }

        #greeting {
            margin-top: 5px;
            margin-bottom: 20px;
            margin-left: 16px;
            font-size: 22px;
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--tg-theme-hint-color, #888888);
            margin-bottom: 8px;
            margin-left: 16px;
            letter-spacing: 0.5px;
        }

        .list-group {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
            transition: background-color 0.2s;
        }
        
        .list-item:active { background-color: var(--tg-theme-secondary-bg-color, #f0f0f0); }
        .list-item:last-child { border-bottom: none; }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 500;
        }

        .item-icon { font-size: 24px; }
        .chevron { color: var(--tg-theme-hint-color, #c7c7cc); font-size: 18px; font-weight: bold; }

        /* Кнопка "Назад" для екрану читання */
        .back-btn {
            background: none;
            border: none;
            color: var(--tg-theme-button-color, #007aff);
            font-size: 16px;
            padding: 0;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div id="modules-list">
        <h2 id="greeting">Привіт!</h2>
        
        <div class="section-title">Розділ навчання</div>
        
        <div class="list-group">
            <div class="list-item" onclick="loadModule(1)">
                <div class="item-left">
                    <span class="item-icon">🎓</span>
                    <span>Вступ (Модуль 1)</span>
                </div>
                <div class="chevron">›</div>
            </div>

            <div class="list-item" onclick="loadModule(2)">
                <div class="item-left">
                    <span class="item-icon">📜</span>
                    <span>Правила (Модуль 2)</span>
                </div>
                <div class="chevron">›</div>
            </div>

            <div class="list-item" onclick="loadModule(3)">
                <div class="item-left">
                    <span class="item-icon">💬</span>
                    <span>Спілкування з лідами</span>
                </div>
                <div class="chevron">›</div>
            </div>
        </div>
    </div>

    <div id="module-reader" style="display: none;">
        <button class="back-btn" onclick="closeModule()">
            <span style="font-size: 20px;">‹</span> Назад
        </button>
        
        <h2 id="module-title">Завантаження...</h2>
        
        <div class="list-group" style="padding: 16px;">
            <div id="module-content" style="line-height: 1.6; font-size: 15px;"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Підставляємо ім'я (використовуємо зворотні лапки ` )
        let userName = tg.initDataUnsafe?.user?.first_name || "Колего";
        document.getElementById("greeting").innerText = `Привіт, ${userName}!`;

        const API_BASE_URL = "https://ethanol-discolor-subtract.ngrok-free.dev";

        async function loadModule(stageNumber) {
            tg.HapticFeedback.selectionChanged(); // Вібрація

            // Ховаємо список, показуємо вікно читання
            document.getElementById('modules-list').style.display = 'none';
            document.getElementById('module-reader').style.display = 'block';
            document.getElementById('module-title').innerText = 'Завантаження...';
            document.getElementById('module-content').innerText = '';

            try {
                // Використовуємо зворотні лапки ` для змінних
                let response = await fetch(`${API_BASE_URL}/api/module/${stageNumber}`);
                
                if (response.ok) {
                    let data = await response.json();
                    document.getElementById('module-title').innerText = data.title;
                    document.getElementById('module-content').innerText = data.theory_text;
                } else {
                    document.getElementById('module-title').innerText = 'Помилка';
                    document.getElementById('module-content').innerText = 'Модуль ще не додано в базу.';
                }
            } catch (error) {
                document.getElementById('module-title').innerText = "Помилка з'єднання";
                document.getElementById('module-content').innerText = 'Перевірте підключення до сервера.';
            }
        }

        function closeModule() {
            tg.HapticFeedback.selectionChanged();
            // Повертаємось до списку
            document.getElementById('module-reader').style.display = 'none';
            document.getElementById('modules-list').style.display = 'block';
        }
    </script>

</body>
</html>
