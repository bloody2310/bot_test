<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentara App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Основний фон (як фон чату в Telegram) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
        }

        /* Імітація текстового повідомлення від бота */
        .bot-message {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Контейнер для кнопок */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px; /* Відстань між кнопками */
        }

        /* Імітація інлайн-кнопки Telegram */
        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center; /* Текст по центру, як в інлайн-кнопках */
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            border: none;
            border-radius: 8px; /* Характерне заокруглення інлайн-кнопок */
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.1s;
        }

        .tg-button:active {
            opacity: 0.6; /* Анімація при натисканні */
        }

        .emoji {
            margin-right: 6px;
            font-size: 18px;
        }

        /* Кнопка "Назад" для екрану читання */
        .back-btn {
            background: none;
            border: none;
            color: var(--tg-theme-button-color, #3390ec);
            font-size: 16px;
            padding: 0;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div id="modules-list">
        
        <div class="bot-message">
            <b id="greeting">Привіт!</b><br><br>
            <b>📚 Розділ навчання</b><br>
            Тут ти знайдеш усю необхідну інформацію для старту роботи. Проходь модулі по черзі.
        </div>
        
        <div class="keyboard">
            <button class="tg-button" onclick="loadModule(1)">
                <span class="emoji">🎓</span> Вступ (Модуль 1)
            </button>

            <button class="tg-button" onclick="loadModule(2)">
                <span class="emoji">📜</span> Правила (Модуль 2)
            </button>

            <button class="tg-button" onclick="loadModule(3)">
                <span class="emoji">💬</span> Спілкування з лідами
            </button>
        </div>
    </div>

    <div id="module-reader" style="display: none;">
        <button class="back-btn" onclick="closeModule()">
            <span style="font-size: 20px;">‹</span> Назад
        </button>
        
        <h2 id="module-title" style="margin-top: 0;">Завантаження...</h2>
        
        <div id="module-content" style="line-height: 1.6; font-size: 15px;"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let userName = tg.initDataUnsafe?.user?.first_name || "Колего";
        document.getElementById("greeting").innerText = `Вітаємо, ${userName}! 🚀`;

        // Твоє посилання ngrok
        const API_BASE_URL = "https://ethanol-discolor-subtract.ngrok-free.dev";

        async function loadModule(stageNumber) {
            tg.HapticFeedback.selectionChanged();

            document.getElementById('modules-list').style.display = 'none';
            document.getElementById('module-reader').style.display = 'block';
            document.getElementById('module-title').innerText = 'Завантаження...';
            document.getElementById('module-content').innerText = '';

            try {
                let response = await fetch(`${API_BASE_URL}/api/module/${stageNumber}`);
                
                if (response.ok) {
                    let data = await response.json();
                    document.getElementById('module-title').innerText = data.title;
                    document.getElementById('module-content').innerText = data.theory_text;
                } else {
                    document.getElementById('module-title').innerText = 'Помилка';
                    document.getElementById('module-content').innerText = 'Модуль ще не додано в базу.';
                }
            } catch (error) {
                document.getElementById('module-title').innerText = "Помилка з'єднання";
                document.getElementById('module-content').innerText = 'Перевірте підключення до сервера.';
            }
        }

        function closeModule() {
            tg.HapticFeedback.selectionChanged();
            document.getElementById('module-reader').style.display = 'none';
            document.getElementById('modules-list').style.display = 'block';
        }
    </script>

</body>
</html>
