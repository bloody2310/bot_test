<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний портал</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Базові стилі, які адаптуються під тему Telegram користувача */
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        h2 { margin-bottom: 5px; text-align: center; }
        p { text-align: center; color: var(--tg-theme-hint-color, #888888); }
        .btn {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h2 id="greeting">Вітаємо!</h2>
    <p>Обери потрібний розділ для роботи</p>

    <button class="btn" onclick="tg.showAlert('Тут буде 7 етапів навчання')">📚 Навчання</button>
    <button class="btn" style="background-color: #f5b041;" onclick="tg.showAlert('Доступ закрито. Спочатку пройди навчання.')">📝 Екзамен</button>
    <button class="btn" style="background-color: #27ae60;" onclick="tg.showAlert('Форма додавання лідів')">📊 Додати ліди</button>

    <script>
        // Ініціалізація Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо додаток на весь екран

        // Отримуємо ім'я користувача і підставляємо в заголовок
        let userName = tg.initDataUnsafe?.user?.first_name || "Воркер";
        document.getElementById("greeting").innerText = `Вітаємо, ${userName}!`;
    </script>

</body>
</html>
